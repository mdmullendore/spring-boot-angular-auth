<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Create account</h2>
    <p class="auth-subtitle">Get started for free</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.input-error]="email?.invalid && email?.touched"
        />
        <span class="error" *ngIf="email?.invalid && email?.touched">
          Please enter a valid email address.
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.input-error]="password?.invalid && password?.touched"
        />
        <span class="error" *ngIf="password?.invalid && password?.touched">
          Password must be at least 8 characters.
        </span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="••••••••"
          [class.input-error]="form.errors?.['passwordMismatch'] && confirmPassword?.touched"
        />
        <span class="error" *ngIf="form.errors?.['passwordMismatch'] && confirmPassword?.touched">
          Passwords do not match.
        </span>
      </div>

      <span class="error server-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </span>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create account' }}
      </button>

    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/auth/login">Sign in</a>
    </p>
  </div>
</div>
